<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; script-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Data Package Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="header-title">Discord Data Package Viewer</h1>
      <div class="top-actions">
        <button id="selectPackageButton" class="button" type="button">Import ZIP</button>
        <span id="statusBadge" class="status-badge status-idle">Idle</span>
        <span id="versions" class="muted small"></span>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <section class="card">
          <h2 class="card-title">Search & Filters</h2>
          <div class="search-grid">
            <div>
              <label for="filterText">Message text</label>
              <input id="filterText" type="search" placeholder="Search messages..." />
            </div>
            <div>
              <label for="filterChannel">Channel</label>
              <select id="filterChannel">
                <option value="">All channels</option>
              </select>
            </div>
            <div>
              <label for="dateFrom">Date from (optional)</label>
              <input id="dateFrom" type="date" />
            </div>
            <div>
              <label for="dateTo">Date to (optional)</label>
              <input id="dateTo" type="date" />
            </div>
            <div>
              <label for="sortDirection">Sort order</label>
              <select id="sortDirection">
                <option value="asc">Oldest to newest</option>
                <option value="desc">Newest to oldest</option>
              </select>
            </div>
          </div>
        </section>

        <section class="card">
          <h2 class="card-title">Channels</h2>
          <ul id="channelList" class="channel-list"></ul>
        </section>
      </aside>

      <main class="content">
        <section class="card">
          <h2 id="timelineTitle" class="card-title">Message Timeline</h2>
          <p id="importStatus" class="muted small">No package selected.</p>
          <div id="timeline" class="timeline"></div>
        </section>

        <section class="card">
          <h2 class="card-title">Badges</h2>
          <div id="badgePanel" class="badge-panel"></div>
        </section>

        <section class="card">
          <h2 class="card-title">Recent Emojis</h2>
          <div id="recentEmojisPanel" class="emoji-panel"></div>
        </section>

        <section class="card">
          <h2 class="card-title">Favorite Emojis</h2>
          <div id="favoriteEmojisPanel" class="emoji-panel"></div>
        </section>

        <section class="card">
          <div class="card-header-row">
            <h2 class="card-title">Premium History</h2>
            <div class="segmented-toggle" role="group" aria-label="Premium history view mode">
              <button id="premiumModeText" class="toggle-button" type="button" data-mode="text">Text</button>
              <button id="premiumModeGraph" class="toggle-button" type="button" data-mode="graph">Graph</button>
            </div>
          </div>
          <div id="premiumHistory" class="premium-history"></div>
        </section>
      </main>
    </div>

    <script>
      const versionsEl = document.getElementById('versions')
      const importStatusEl = document.getElementById('importStatus')
      const selectPackageButton = document.getElementById('selectPackageButton')
      const sortDirectionEl = document.getElementById('sortDirection')
      const filterTextEl = document.getElementById('filterText')
      const filterChannelEl = document.getElementById('filterChannel')
      const dateFromEl = document.getElementById('dateFrom')
      const dateToEl = document.getElementById('dateTo')
      const channelListEl = document.getElementById('channelList')
      const timelineEl = document.getElementById('timeline')
      const timelineTitleEl = document.getElementById('timelineTitle')
      const statusBadgeEl = document.getElementById('statusBadge')
      const premiumHistoryEl = document.getElementById('premiumHistory')
      const badgePanelEl = document.getElementById('badgePanel')
      const recentEmojisPanelEl = document.getElementById('recentEmojisPanel')
      const favoriteEmojisPanelEl = document.getElementById('favoriteEmojisPanel')
      const premiumModeTextEl = document.getElementById('premiumModeText')
      const premiumModeGraphEl = document.getElementById('premiumModeGraph')

      const versions = window.ddpApi.getRuntimeVersions()
      versionsEl.textContent = `Electron ${versions.electron} • Chrome ${versions.chrome}`

      const PREMIUM_HISTORY_MODE_KEY = 'ddp:premium-history-mode'

      const state = {
        latestImportId: null,
        importMeta: null,
        channels: [],
        messagesByChannel: {},
        selectedChannelId: '',
        status: 'idle',
        premiumHistory: [],
        badges: [],
        recentEmojis: [],
        favoriteEmojis: [],
        premiumHistoryMode: localStorage.getItem(PREMIUM_HISTORY_MODE_KEY) === 'graph' ? 'graph' : 'text',
      }

      const timestampFormatter = new Intl.DateTimeFormat(undefined, {
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
      })

      function setStatus(status, label) {
        state.status = status
        statusBadgeEl.className = `status-badge status-${status}`
        statusBadgeEl.textContent = label
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;')
      }

      function isImageAttachment(attachment) {
        const target = attachment?.filename || attachment?.url || ''
        return /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(target)
      }

      function messageInDateRange(message, fromDate, toDate) {
        if (!message?.timestamp) {
          return true
        }

        const epoch = Date.parse(message.timestamp)
        if (Number.isNaN(epoch)) {
          return true
        }

        if (fromDate) {
          const fromEpoch = Date.parse(`${fromDate}T00:00:00`)
          if (!Number.isNaN(fromEpoch) && epoch < fromEpoch) {
            return false
          }
        }

        if (toDate) {
          const toEpoch = Date.parse(`${toDate}T23:59:59.999`)
          if (!Number.isNaN(toEpoch) && epoch > toEpoch) {
            return false
          }
        }

        return true
      }

      function getVisibleChannels() {
        const channelFilter = filterChannelEl.value
        if (!channelFilter) {
          return state.channels
        }

        return state.channels.filter((channel) => channel.id === channelFilter)
      }

      function getFilteredMessages(channelId) {
        const messages = state.messagesByChannel[channelId] || []
        const searchTerm = filterTextEl.value.trim().toLowerCase()
        const fromDate = dateFromEl.value
        const toDate = dateToEl.value

        return messages.filter((message) => {
          const matchesText =
            !searchTerm ||
            message.content.toLowerCase().includes(searchTerm) ||
            message.author.toLowerCase().includes(searchTerm)

          return matchesText && messageInDateRange(message, fromDate, toDate)
        })
      }

      function formatTimestampForDisplay(timestamp) {
        if (!timestamp) {
          return 'Present'
        }

        const epoch = Date.parse(timestamp)
        if (Number.isNaN(epoch)) {
          return timestamp
        }

        return timestampFormatter.format(new Date(epoch))
      }

      function formatDuration(startAt, endAt) {
        const startEpoch = Date.parse(startAt)
        const endEpoch = endAt ? Date.parse(endAt) : Date.now()

        if (Number.isNaN(startEpoch) || Number.isNaN(endEpoch) || endEpoch < startEpoch) {
          return 'Unknown duration'
        }

        const totalMs = endEpoch - startEpoch
        const days = Math.floor(totalMs / (1000 * 60 * 60 * 24))
        const hours = Math.floor((totalMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))

        if (days > 0) {
          return `${days}d ${hours}h`
        }

        const minutes = Math.floor((totalMs % (1000 * 60 * 60)) / (1000 * 60))
        return `${hours}h ${minutes}m`
      }

      function setPremiumHistoryMode(mode) {
        state.premiumHistoryMode = mode === 'graph' ? 'graph' : 'text'
        localStorage.setItem(PREMIUM_HISTORY_MODE_KEY, state.premiumHistoryMode)
      }

      function renderPremiumHistoryText() {
        if (state.premiumHistory.length === 0) {
          premiumHistoryEl.innerHTML = '<div class="state">No premium history found in this export.</div>'
          return
        }

        premiumHistoryEl.innerHTML = `<ul class="premium-interval-list">${state.premiumHistory
          .map((interval) => {
            const giftedLabel = interval.isGifted ? 'Gifted' : 'Direct'
            const planLabel = interval.planType || 'unknown'
            const startLabel = formatTimestampForDisplay(interval.startAt)
            const endLabel = formatTimestampForDisplay(interval.endAt)
            const durationLabel = formatDuration(interval.startAt, interval.endAt)

            return `<li class="premium-interval-item">
              <div class="premium-interval-title">${escapeHtml(startLabel)} → ${escapeHtml(endLabel)}</div>
              <div class="muted small">Duration: ${escapeHtml(durationLabel)} • Plan: ${escapeHtml(planLabel)} • ${giftedLabel}</div>
              <div class="muted small">Source: ${escapeHtml(interval.source || 'unknown')}</div>
            </li>`
          })
          .join('')}</ul>`
      }

      function renderPremiumHistoryGraph() {
        if (state.premiumHistory.length === 0) {
          premiumHistoryEl.innerHTML = '<div class="state">No premium history found in this export.</div>'
          return
        }

        const points = []
        for (const interval of state.premiumHistory) {
          const startEpoch = Date.parse(interval.startAt)
          const endEpoch = interval.endAt ? Date.parse(interval.endAt) : Date.now()
          if (Number.isNaN(startEpoch) || Number.isNaN(endEpoch) || endEpoch < startEpoch) {
            continue
          }

          points.push({ ...interval, startEpoch, endEpoch })
        }

        if (points.length === 0) {
          premiumHistoryEl.innerHTML = '<div class="state">Premium history exists but could not be graphed due to invalid dates.</div>'
          return
        }

        const minStart = Math.min(...points.map((item) => item.startEpoch))
        const maxEnd = Math.max(...points.map((item) => item.endEpoch))
        const range = Math.max(1, maxEnd - minStart)

        premiumHistoryEl.innerHTML = `
          <div class="premium-graph-shell">
            <div class="premium-graph-track">
              ${points
                .map((item) => {
                  const left = ((item.startEpoch - minStart) / range) * 100
                  const width = Math.max(0.8, ((item.endEpoch - item.startEpoch) / range) * 100)
                  const title = `${formatTimestampForDisplay(item.startAt)} → ${formatTimestampForDisplay(item.endAt)} (${formatDuration(item.startAt, item.endAt)})`

                  return `<div class="premium-graph-segment" style="left:${left}%;width:${width}%;" title="${escapeHtml(title)}"></div>`
                })
                .join('')}
            </div>
            <div class="premium-graph-axis muted small">
              <span>${escapeHtml(formatTimestampForDisplay(new Date(minStart).toISOString()))}</span>
              <span>${escapeHtml(formatTimestampForDisplay(new Date(maxEnd).toISOString()))}</span>
            </div>
          </div>
        `
      }

      function renderPremiumHistory() {
        premiumModeTextEl.classList.toggle('active', state.premiumHistoryMode === 'text')
        premiumModeGraphEl.classList.toggle('active', state.premiumHistoryMode === 'graph')

        if (state.premiumHistoryMode === 'graph') {
          renderPremiumHistoryGraph()
          return
        }

        renderPremiumHistoryText()
      }

      function getBadgeIcon(iconKey) {
        const icons = {
          staff: '🛡️',
          partner: '🤝',
          hypesquad_events: '🎪',
          hypesquad_bravery: '🦁',
          hypesquad_brilliance: '🧠',
          hypesquad_balance: '⚖️',
          bug_hunter_1: '🐛',
          bug_hunter_2: '🐞',
          early_supporter: '🌟',
          verified_bot_developer: '🤖',
          certified_moderator: '🧭',
          bot_http_interactions: '🛰️',
          active_developer: '🧑‍💻',
          nitro: '⚡',
          nitro_classic: '💎',
          nitro_basic: '✨',
          unknown: '❔',
        }

        return icons[iconKey] || icons.unknown
      }

      function renderBadges() {
        if (!state.latestImportId || !state.importMeta?.ok) {
          badgePanelEl.innerHTML = '<div class="muted small">Import a package to view badges.</div>'
          return
        }

        if (!Array.isArray(state.badges) || state.badges.length === 0) {
          badgePanelEl.innerHTML = '<div class="muted small">No badge or flag metadata found in this export.</div>'
          return
        }

        badgePanelEl.innerHTML = state.badges
          .map((badge) => {
            const tooltip = badge.description || 'No description available.'
            const source = badge.source ? ` • Source: ${badge.source}` : ''
            const title = `${tooltip}${source}`
            return `<span class="badge-chip" title="${escapeHtml(title)}">
              <span class="badge-icon" aria-hidden="true">${escapeHtml(getBadgeIcon(badge.iconKey))}</span>
              <span>${escapeHtml(badge.displayName)}</span>
            </span>`
          })
          .join('')
      }

      function renderChannelList() {
        const visibleChannels = getVisibleChannels()

        if (visibleChannels.length === 0) {
          channelListEl.innerHTML = '<li class="muted small">No channels match current filters.</li>'
          return
        }

        if (!visibleChannels.some((item) => item.id === state.selectedChannelId)) {
          state.selectedChannelId = visibleChannels[0].id
        }

        channelListEl.innerHTML = visibleChannels
          .map((channel) => {
            const count = getFilteredMessages(channel.id).length
            const activeClass = channel.id === state.selectedChannelId ? 'active' : ''

            return `
              <li>
                <button class="channel-item ${activeClass}" type="button" data-channel-id="${escapeHtml(channel.id)}">
                  <div># ${escapeHtml(channel.name)}</div>
                  <div class="muted small">${escapeHtml(channel.type)} • ${count} shown</div>
                </button>
              </li>
            `
          })
          .join('')
      }

      function renderEmojiChip(emoji) {
        const lastUsed = emoji.lastUsedTimestamp
          ? formatTimestampForDisplay(emoji.lastUsedTimestamp)
          : 'Unknown'
        const tooltip = `Total uses: ${emoji.totalUses} • Last used: ${lastUsed} • Channels: ${emoji.channelCount}`
        const displayName = emoji.type === 'custom' ? `:${emoji.name}:` : emoji.unicode || emoji.raw || emoji.name

        const mediaHtml =
          emoji.type === 'custom' && emoji.assetUrl
            ? `<img class="emoji-image" src="${escapeHtml(emoji.assetUrl)}" alt="${escapeHtml(displayName)}" loading="lazy" onerror="this.hidden=true;this.nextElementSibling.hidden=false;" />
               <span class="emoji-fallback" hidden>${escapeHtml(displayName)}</span>`
            : `<span class="emoji-fallback">${escapeHtml(displayName)}</span>`

        return `<span class="emoji-chip" title="${escapeHtml(tooltip)}">
          <span class="emoji-media">${mediaHtml}</span>
          <span class="emoji-meta">
            <span class="emoji-label">${escapeHtml(displayName)}</span>
            <span class="muted small">×${emoji.totalUses}</span>
          </span>
        </span>`
      }

      function renderEmojiPanels() {
        if (!state.latestImportId || !state.importMeta?.ok) {
          recentEmojisPanelEl.innerHTML = '<div class="muted small">Import a package to view emoji usage.</div>'
          favoriteEmojisPanelEl.innerHTML = '<div class="muted small">Import a package to view emoji usage.</div>'
          return
        }

        if (!state.recentEmojis.length) {
          recentEmojisPanelEl.innerHTML = '<div class="muted small">No emoji usage found in messages/reactions.</div>'
        } else {
          recentEmojisPanelEl.innerHTML = state.recentEmojis.map(renderEmojiChip).join('')
        }

        if (!state.favoriteEmojis.length) {
          favoriteEmojisPanelEl.innerHTML = '<div class="muted small">No emoji usage found in messages/reactions.</div>'
        } else {
          favoriteEmojisPanelEl.innerHTML = state.favoriteEmojis.map(renderEmojiChip).join('')
        }
      }

      function renderTimeline() {
        if (!state.latestImportId) {
          timelineTitleEl.textContent = 'Message Timeline'
          timelineEl.innerHTML = '<div class="state">Import a ZIP package to view channels and messages.</div>'
          return
        }

        if (!state.importMeta?.ok) {
          const warningLines = (state.importMeta?.warnings || []).map((item) => `<li>${escapeHtml(item)}</li>`).join('')
          timelineEl.innerHTML = `
            <div class="state error">
              <p>Import failed or archive is missing required Discord sections.</p>
              <ul>${warningLines || '<li>No additional details available.</li>'}</ul>
            </div>
          `
          return
        }

        const activeChannel = state.channels.find((channel) => channel.id === state.selectedChannelId)
        if (!activeChannel) {
          timelineEl.innerHTML = '<div class="state">No channel selected.</div>'
          return
        }

        const filteredMessages = getFilteredMessages(activeChannel.id)
        timelineTitleEl.textContent = `Message Timeline · #${activeChannel.name}`

        if (filteredMessages.length === 0) {
          timelineEl.innerHTML = '<div class="state">No messages matched the current search/filter criteria.</div>'
          return
        }

        timelineEl.innerHTML = filteredMessages
          .map((message) => {
            const hasAttachments = message.attachments && message.attachments.length > 0
            const timestamp = message.timestamp
              ? timestampFormatter.format(new Date(message.timestamp))
              : 'Unknown time'

            const attachmentsHtml = hasAttachments
              ? `<div class="attachments">${message.attachments
                  .map((attachment) => {
                    const label = attachment.filename || 'Attachment'
                    const link = attachment.url
                      ? `<a href="${escapeHtml(attachment.url)}" target="_blank" rel="noreferrer noopener">${escapeHtml(label)}</a>`
                      : `<span>${escapeHtml(label)}</span>`
                    const preview =
                      attachment.url && isImageAttachment(attachment)
                        ? `<img src="${escapeHtml(attachment.url)}" alt="${escapeHtml(label)}" loading="lazy" />`
                        : ''

                    return `<div class="attachment">${link}${preview}</div>`
                  })
                  .join('')}</div>`
              : ''

            return `
              <article class="message">
                <header class="message-header">
                  <span class="message-author">${escapeHtml(message.author)}</span>
                  <time class="message-time">${escapeHtml(timestamp)}</time>
                </header>
                <div class="message-content">${escapeHtml(message.content || '(no text content)')}</div>
                ${attachmentsHtml}
              </article>
            `
          })
          .join('')
      }

      function render() {
        renderChannelList()
        renderTimeline()
        renderBadges()
        renderEmojiPanels()
        renderPremiumHistory()

        if (state.importMeta?.warnings?.length) {
          importStatusEl.textContent = state.importMeta.warnings.join(' | ')
        }
      }

      function syncFilterChannelOptions() {
        const existingValue = filterChannelEl.value
        filterChannelEl.innerHTML = '<option value="">All channels</option>'
        for (const channel of state.channels) {
          filterChannelEl.innerHTML += `<option value="${escapeHtml(channel.id)}"># ${escapeHtml(channel.name)}</option>`
        }

        if (state.channels.some((item) => item.id === existingValue)) {
          filterChannelEl.value = existingValue
        }
      }

      async function loadParsedData() {
        if (!state.latestImportId) {
          return
        }

        const parserPage = await window.ddpApi.getParserPage({
          importId: state.latestImportId,
          channelPage: 1,
          channelPageSize: 1000,
          messagePage: 1,
          messagePageSize: 5000,
          sortDirection: sortDirectionEl.value,
        })

        if (!parserPage.ok) {
          state.importMeta = {
            ok: false,
            warnings: parserPage.warnings || ['Unable to load parsed data.'],
          }
          state.channels = []
          state.messagesByChannel = {}
          state.premiumHistory = []
          state.badges = []
          state.recentEmojis = []
          state.favoriteEmojis = []
          setStatus('error', 'Error')
          render()
          return
        }

        state.channels = parserPage.channels || []
        state.messagesByChannel = parserPage.messagesByChannel || {}
        state.premiumHistory = parserPage.premiumHistory || []
        state.badges = parserPage.badges || []
        state.recentEmojis = parserPage.recentEmojis || []
        state.favoriteEmojis = parserPage.favoriteEmojis || []
        if (!state.selectedChannelId && state.channels.length > 0) {
          state.selectedChannelId = state.channels[0].id
        }

        syncFilterChannelOptions()
        setStatus('ready', 'Ready')
        render()
      }

      sortDirectionEl.addEventListener('change', loadParsedData)

      for (const element of [filterTextEl, filterChannelEl, dateFromEl, dateToEl]) {
        element.addEventListener('input', render)
        element.addEventListener('change', render)
      }

      premiumModeTextEl.addEventListener('click', () => {
        setPremiumHistoryMode('text')
        renderPremiumHistory()
      })

      premiumModeGraphEl.addEventListener('click', () => {
        setPremiumHistoryMode('graph')
        renderPremiumHistory()
      })

      channelListEl.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-channel-id]')
        if (!button) {
          return
        }

        state.selectedChannelId = button.dataset.channelId
        render()
      })

      selectPackageButton.addEventListener('click', async () => {
        setStatus('loading', 'Loading')
        importStatusEl.textContent = 'Importing archive...'

        const importResult = await window.ddpApi.selectZip()

        if (!importResult) {
          setStatus('idle', 'Idle')
          importStatusEl.textContent = 'Import cancelled.'
          return
        }

        state.latestImportId = importResult.importId
        state.importMeta = importResult
        state.selectedChannelId = ''

        if (!importResult.ok) {
          setStatus('error', 'Error')
          const invalidZip = (importResult.warnings || []).some((warning) =>
            warning.toLowerCase().includes('failed to extract'),
          )
          importStatusEl.textContent = invalidZip
            ? 'Invalid ZIP archive. Please choose a valid Discord export.'
            : 'Import completed, but expected Discord sections are missing.'
          render()
          return
        }

        importStatusEl.textContent = `Imported ${importResult.parserSummary.channelCount} channels, ${importResult.parserSummary.messageCount} messages.`
        await loadParsedData()
      })

      render()
    </script>
  </body>
</html>
