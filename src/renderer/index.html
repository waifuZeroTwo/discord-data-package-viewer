<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Data Package Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111827;
        --surface: #1f2937;
        --border: #374151;
        --text: #f9fafb;
        --muted: #9ca3af;
        --accent: #6366f1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: grid;
        grid-template-rows: 56px 1fr;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        background: #0b1220;
        border-bottom: 1px solid var(--border);
      }

      .layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        min-height: 0;
      }

      aside,
      main {
        padding: 16px;
        overflow: auto;
      }

      aside {
        background: #0f172a;
        border-right: 1px solid var(--border);
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }

      button,
      select {
        background: var(--accent);
        color: white;
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
      }

      select {
        margin-top: 8px;
        width: 100%;
      }

      button:hover {
        filter: brightness(1.08);
      }

      .muted {
        color: var(--muted);
      }

      pre {
        background: #0b1220;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Discord Data Package Viewer</h1>
      <span id="versions" class="muted"></span>
    </header>

    <div class="layout">
      <aside>
        <section class="card">
          <h2>Import</h2>
          <p class="muted">Open a Discord data package archive to begin parsing.</p>
          <button id="selectPackageButton" type="button">Select ZIP package</button>
          <label class="muted" for="sortDirection">Message sort order</label>
          <select id="sortDirection">
            <option value="asc">Oldest to newest</option>
            <option value="desc">Newest to oldest</option>
          </select>
        </section>

        <section class="card">
          <h2>Status</h2>
          <p id="importStatus" class="muted">No package selected.</p>
        </section>
      </aside>

      <main>
        <section class="card">
          <h2>Parsed Discord Data</h2>
          <p class="muted">
            Parsed output is fetched from the main process in paginated channel/message chunks.
          </p>
          <pre id="dataPreview">{ "summary": "No data loaded" }</pre>
        </section>
      </main>
    </div>

    <script>
      const versionsEl = document.getElementById('versions')
      const importStatusEl = document.getElementById('importStatus')
      const dataPreviewEl = document.getElementById('dataPreview')
      const selectPackageButton = document.getElementById('selectPackageButton')
      const sortDirectionEl = document.getElementById('sortDirection')

      const versions = window.ddpApi.getRuntimeVersions()
      versionsEl.textContent = `Electron ${versions.electron} • Chrome ${versions.chrome}`

      let latestImportId = null

      async function loadFirstParserPage() {
        if (!latestImportId) {
          return
        }

        const parserPage = await window.ddpApi.getParserPage({
          importId: latestImportId,
          channelPage: 1,
          channelPageSize: 25,
          messagePage: 1,
          messagePageSize: 200,
          sortDirection: sortDirectionEl.value,
        })

        dataPreviewEl.textContent = JSON.stringify(parserPage, null, 2)
      }

      sortDirectionEl.addEventListener('change', loadFirstParserPage)

      selectPackageButton.addEventListener('click', async () => {
        const importResult = await window.ddpApi.selectZip()

        if (!importResult) {
          importStatusEl.textContent = 'Import cancelled.'
          return
        }

        latestImportId = importResult.importId

        if (!importResult.ok) {
          importStatusEl.textContent = 'Import completed with issues. Review warnings.'
        } else {
          importStatusEl.textContent = `Imported package: ${importResult.importId}`
        }

        await loadFirstParserPage()
      })
    </script>
  </body>
</html>
